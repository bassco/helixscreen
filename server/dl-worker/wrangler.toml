name = "helix-dl-worker"
main = "src/index.ts"
compatibility_date = "2024-12-01"
workers_dev = false

[[routes]]
pattern = "dl.helixscreen.org/*"
zone_name = "helixscreen.org"

[[r2_buckets]]
binding = "RELEASES_BUCKET"
bucket_name = "helixscreen-releases"

[[ratelimits]]
name = "DL_LIMITER"
namespace_id = "1004"
[ratelimits.simple]
limit = 30
period = 60
